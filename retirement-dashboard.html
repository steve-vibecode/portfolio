function AnimatedNumber({ value, prefix = "", suffix = "", decimals = 0, style = {}, className = "" }) {
  const [display, setDisplay] = useState(value);
  const prev = useRef(value);
  const raf = useRef(null);
  useEffect(() => {
    const start = prev.current;
    const end = value;
    if (start === end) return;
    const duration = 700;
    const startTime = performance.now();
    const tick = (now) => {
      const t = Math.min((now - startTime) / duration, 1);
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      setDisplay(start + (end - start) * ease);
      if (t < 1) raf.current = requestAnimationFrame(tick);
      else { setDisplay(end); prev.current = end; }
    };
    raf.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf.current);
  }, [value]);
  const formatted = decimals > 0
    ? display.toLocaleString("en-US", { minimumFractionDigits: decimals, maximumFractionDigits: decimals })
    : Math.round(display).toLocaleString("en-US");
  return <span className={className} style={style}>{prefix}{formatted}{suffix}</span>;
}

function toYahooSymbol(ticker, market) {
  if (market !== 'MY') return ticker;
  return ticker.toUpperCase().endsWith('.KL') ? ticker : `${ticker}.KL`;
}

function App() {

    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? { ...DEFAULT_SETTINGS, ...JSON.parse(saved) } : DEFAULT_SETTINGS;

  const [prices, setPrices] = useState({});
  const [fxRate, setFxRate] = useState(0);
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [error, setError] = useState(null);

  const [savings, setSavings] = useState([]);
  const [emergencyFund, setEmergencyFund] = useState([]);
  const [investments, setInvestments] = useState([]);
  const [liabilities, setLiabilities] = useState([]);

  // Editing state: { table, id } or { table, 'new' }
  const [editing, setEditing] = useState(null);
  const [editForm, setEditForm] = useState({});
  const [saving, setSaving] = useState(false);

  const startEdit = (table, row) => {
    setEditing({ table, id: row.id });
    setEditForm({ ...row });

    setEditing({ table, id: 'new' });
    setEditForm(defaults);

  const commitEdit = async () => {
    if (!editing) return;
    setSaving(true);
    try {
      const { table, id } = editing;
      if (id === 'new') {
        const { id: _id, ...payload } = editForm;
        const { data, error } = await sb.from(table).insert([payload]).select();
        if (error) throw error;
      } else {
        const { error } = await sb.from(table).update(editForm).eq('id', id);
        if (error) throw error;

      await fetchData();
      cancelEdit();
    } catch (e) { alert('Save failed: ' + e.message); }
    finally { setSaving(false); }

      const { error } = await sb.from(table).delete().eq('id', id);

      setDividends(divs);

      const active = Object.values(holdings).filter(h => h.units > 0.00001);

                </div>

                {/* Col 3: Retirement Commitment — editable */}
                <div style={{ flex: 1, paddingLeft: 16, display: "flex", flexDirection: "column", minHeight: 0 }}>
                  <div className="panel-tag" style={{ marginBottom: 6 }}>◆ RETIREMENT COMMITMENT</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 90px 1fr 44px", gap: 0, fontSize: 9, letterSpacing: 1.2, color: c.muted, fontFamily: "'Fraunces', Georgia, serif", padding: "3px 0", borderBottom: `1px solid ${c.border}`, fontWeight: 600 }}>
                    <div>CATEGORY</div><div>ANNUAL</div><div>NOTES</div><div></div>
                  </div>
                  <div className="scroll-y" style={{ flex: 1 }}>
                    {fireTargets.map((row) => {
                      const isEditing = editing?.table === 'fire_targets' && editing?.id === row.id;
                      if (isEditing) return (
                        <div key={row.id} className="edit-row" style={{ display: "grid", gridTemplateColumns: "1fr 90px 1fr 44px", gap: 4, padding: "3px 0", borderBottom: `1px solid ${c.border}40`, alignItems: "center" }}>
                          <input className="edit-input" value={editForm.category||''} onChange={e=>setEditForm(f=>({...f,category:e.target.value}))} placeholder="Category" />
                          <input className="edit-input" type="number" value={editForm.annual_amount||''} onChange={e=>setEditForm(f=>({...f,annual_amount:e.target.value}))} placeholder="Amount" />
                          <input className="edit-input" value={editForm.notes||''} onChange={e=>setEditForm(f=>({...f,notes:e.target.value}))} placeholder="Notes" />
                          <div style={{display:"flex",gap:2}}>
                            <button className="btn-icon btn-save" style={{opacity:1}} onClick={commitEdit} disabled={saving}>✓</button>
                            <button className="btn-icon btn-cancel" style={{opacity:1}} onClick={cancelEdit}>✕</button>
                          </div>
                        </div>
                      );
                      return (
                        <div key={row.id} className="milestone-row" style={{ display: "grid", gridTemplateColumns: "1fr 90px 1fr 44px", gap: 0, padding: "4px 0", borderBottom: `1px solid ${c.border}40`, alignItems: "center" }}>
                          <div className="display-serif" style={{ fontSize: 12, color: c.text }}>{row.category}</div>
                          <div className="display-serif gold" style={{ fontSize: 12 }}>RM{Number(row.annual_amount||0).toLocaleString("en-US",{maximumFractionDigits:0})}</div>
                          <div className="display-serif muted" style={{ fontSize: 11 }}>{row.notes||"—"}</div>
                          <div style={{display:"flex",gap:2}}>
                            <button className="btn-icon btn-edit" onClick={()=>startEdit('fire_targets',row)}>✎</button>
                            <button className="btn-icon btn-delete" onClick={()=>deleteRow('fire_targets',row.id)}>✕</button>
                          </div>
                        </div>
                      );
                    })}
                    {editing?.table==='fire_targets' && editing?.id==='new' ? (
                      <div className="edit-row" style={{ display: "grid", gridTemplateColumns: "1fr 90px 1fr 44px", gap: 4, padding: "3px 0", borderBottom: `1px solid ${c.border}40`, alignItems: "center" }}>
                        <input className="edit-input" value={editForm.category||''} onChange={e=>setEditForm(f=>({...f,category:e.target.value}))} placeholder="Category" />
                        <input className="edit-input" type="number" value={editForm.annual_amount||''} onChange={e=>setEditForm(f=>({...f,annual_amount:e.target.value}))} placeholder="Amount" />
                        <input className="edit-input" value={editForm.notes||''} onChange={e=>setEditForm(f=>({...f,notes:e.target.value}))} placeholder="Notes" />
                        <div style={{display:"flex",gap:2}}>
                          <button className="btn-icon btn-save" style={{opacity:1}} onClick={commitEdit} disabled={saving}>✓</button>
                          <button className="btn-icon btn-cancel" style={{opacity:1}} onClick={cancelEdit}>✕</button>
                        </div>
                      </div>
                    ) : (
                      <button className="btn-add" onClick={()=>startAdd('fire_targets',{category:'',annual_amount:'',notes:''})}>+ Add row</button>
                    )}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 90px 1fr 44px", gap: 0, padding: "4px 0", borderTop: `1px solid ${c.gold}`, alignItems: "center", marginTop: 3 }}>
                      <div className="display-serif" style={{ fontSize: 12, fontWeight: 600, color: c.gold }}>TOTAL</div>
                      <div className="display-serif" style={{ fontSize: 12, fontWeight: 600, color: c.green }}>RM{fireTargets.reduce((s,r)=>s+Number(r.annual_amount||0),0).toLocaleString("en-US",{maximumFractionDigits:0})}</div>
                      <div className="display-serif muted" style={{ fontSize: 11 }}>Annual commitment</div>
                      <div></div>
                    </div>
                  </div>
                </div>

              </div>

            </div>
          )}

          {activeTab === "networth" && (() => {
            const toRM = (amt, cur) => cur === 'USD' ? (parseFloat(amt)||0) * fxRate : (parseFloat(amt)||0);

            const efTotal = emergencyFund.reduce((s, r) => s + toRM(r.amount, r.currency), 0);
            const investTotal = investments.reduce((s, r) => s + toRM(r.amount, r.currency), 0);
            const stocksTotal = totalValue;
            const totalAssets = efTotal + investTotal + stocksTotal;

            const hirePurchase = liabilities.find(r => /hire.purchase/i.test(r.name) || /asnb/i.test(r.notes||''));
            const hirePurchaseAmt = hirePurchase ? (parseFloat(hirePurchase.outstanding)||0) : 0;
            const totalLiabilitiesGross = liabilities.reduce((s, r) => s + (parseFloat(r.outstanding)||0), 0);
            const totalLiabilities = totalLiabilitiesGross - hirePurchaseAmt;
            const netWorth = totalAssets - totalLiabilities;

            const assetGroups = [
              { label: "EMERGENCY FUND", color: c.teal, rows: emergencyFund.map(r => ({ name: r.asset, val: toRM(r.amount, r.currency) })), total: efTotal },
              { label: "INVESTMENTS", color: c.gold, rows: investments.map(r => ({ name: r.name, val: toRM(r.amount, r.currency), note: r.category })), total: investTotal },
              { label: "STOCK PORTFOLIO", color: c.gold, rows: [{ name: "Dividend Stocks", val: dividendTotal }, { name: "Growth Stocks", val: growthTotal }], total: stocksTotal },
            ];

            const sf = { fontFamily: "'Fraunces', Georgia, serif" };
            const hdr = { ...sf, fontSize: 9, letterSpacing: 1.5, fontWeight: 600 };

            // Editable asset sub-table (ef / investments)
            const AssetSection = ({ label, color, tableName, rows, total, fields }) => (
              <div style={{ marginBottom: 6 }}>
                {/* header uses same grid as rows so total aligns with amount col */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 76px 30px", alignItems: "baseline", marginBottom: 1 }}>
                  <div style={{ ...hdr, color }}>{label}</div>
                  <div style={{ ...sf, fontSize: 11, color, fontWeight: 600 }}>RM{total.toLocaleString("en-US",{maximumFractionDigits:0})}</div>
                  <div/>
                </div>
                {rows.map((row) => {
                  const isEd = editing?.table === tableName && editing?.id === row.id;
                  if (isEd) return (
                    <div key={row.id} className="edit-row" style={{ display: "flex", gap: 4, padding: "3px 0", borderBottom: `1px solid ${c.border}20`, flexWrap: "wrap", alignItems: "center" }}>
                      {fields.map(f => (
                        <input key={f.key} className="edit-input" style={{ width: f.w||80 }} type={f.type||"text"} value={editForm[f.key]||''} onChange={e=>setEditForm(p=>({...p,[f.key]:e.target.value}))} placeholder={f.label} />
                      ))}
                      <button className="btn-icon btn-save" style={{opacity:1}} onClick={commitEdit} disabled={saving}>✓</button>
                      <button className="btn-icon btn-cancel" style={{opacity:1}} onClick={cancelEdit}>✕</button>
                    </div>
                  );
                  return (
                    <div key={row.id} className="milestone-row" style={{ display: "grid", gridTemplateColumns: "1fr 76px 30px", alignItems: "center", padding: "2px 0", borderBottom: `1px solid ${c.border}20` }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 4, minWidth: 0 }}>
                        <div style={{ ...sf, fontSize: 12, color: c.text, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{row.name||row.asset||row.account}</div>
                        {(row.note||row.category) && <div style={{ ...sf, fontSize: 9, color: c.muted, flexShrink: 0 }}>{row.note||row.category}</div>}
                      </div>
                      <div style={{ ...sf, fontSize: 12, color: c.text }}>RM{(row.valRM||0).toLocaleString("en-US",{maximumFractionDigits:0})}</div>
                      <div style={{ display:"flex", gap:1, justifyContent:"flex-end" }}>
                        <button className="btn-icon btn-edit" onClick={()=>startEdit(tableName, row.raw)}>✎</button>
                        <button className="btn-icon btn-delete" onClick={()=>deleteRow(tableName, row.raw.id)}>✕</button>
                      </div>
                    </div>
                  );
                })}
                {editing?.table===tableName && editing?.id==='new' ? (
                  <div className="edit-row" style={{ display: "flex", gap: 4, padding: "3px 0", flexWrap: "wrap", alignItems: "center" }}>
                    {fields.map(f => (
                      <input key={f.key} className="edit-input" style={{ width: f.w||80 }} type={f.type||"text"} value={editForm[f.key]||''} onChange={e=>setEditForm(p=>({...p,[f.key]:e.target.value}))} placeholder={f.label} />
                    ))}
                    <button className="btn-icon btn-save" style={{opacity:1}} onClick={commitEdit} disabled={saving}>✓</button>
                    <button className="btn-icon btn-cancel" style={{opacity:1}} onClick={cancelEdit}>✕</button>
                  </div>
                ) : (
                  <button className="btn-add" onClick={()=>startAdd(tableName, fields.reduce((a,f)=>({...a,[f.key]:''}),{}))}>+ Add</button>
                )}
              </div>
            );

            const efRows = emergencyFund.map(r => ({ ...r, name: r.asset, valRM: toRM(r.amount, r.currency), note: null, raw: r }));
            const invRows = investments.map(r => ({ ...r, valRM: toRM(r.amount, r.currency), raw: r }));

            return (
              <div style={{ display: "grid", gridTemplateColumns: "28% 42% 30%", gap: 0, flex: 1, minHeight: 0, overflow: "hidden" }}>

                {/* COL 1: Assets — editable */}
                <div style={{ paddingRight: 14, borderRight: `1px solid ${c.border}`, display: "flex", flexDirection: "column", minHeight: 0, overflow: "hidden" }}>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 76px 30px", alignItems: "baseline", paddingBottom: 3, borderBottom: `1px solid ${c.border}`, marginBottom: 4 }}>
                    <div style={{ ...hdr, color: c.teal }}>◆ TOTAL ASSETS</div>
                    <div style={{ ...sf, fontSize: 13, color: c.teal, fontWeight: 600 }}>RM{totalAssets.toLocaleString("en-US",{maximumFractionDigits:0})}</div>
                    <div/>
                  </div>
                  <div className="scroll-y" style={{ flex: 1 }}>
                    <AssetSection label="EMERGENCY FUND" color={c.teal} tableName="emergency_fund" total={efTotal}
                      rows={efRows}
                      fields={[
                        {key:'asset', label:'Asset', w:100},
                        {key:'amount', label:'Amount', w:80, type:'number'},
                        {key:'currency', label:'MYR/USD', w:60},
                      ]} />
                    <AssetSection label="INVESTMENTS" color={c.gold} tableName="investments" total={investTotal}
                      rows={invRows}
                      fields={[
                        {key:'name', label:'Name', w:100},
                        {key:'amount', label:'Amount', w:80, type:'number'},
                        {key:'currency', label:'MYR/USD', w:60},
                        {key:'category', label:'Category', w:80},
                        {key:'notes', label:'Notes', w:80},
                      ]} />
                    {/* Stocks — read only, derived from transactions */}
                    <div style={{ marginBottom: 4 }}>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 76px 30px", alignItems: "baseline", marginBottom: 1 }}>
                        <div style={{ ...hdr, color: c.gold }}>STOCK PORTFOLIO</div>
                        <div style={{ ...sf, fontSize: 11, color: c.gold, fontWeight: 600 }}>RM{stocksTotal.toLocaleString("en-US",{maximumFractionDigits:0})}</div>
                        <div/>
                      </div>
                      {[{name:"Dividend Stocks", val:dividendTotal},{name:"Growth Stocks",val:growthTotal}].map((r,i)=>(
                        <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 76px 30px", alignItems: "center", padding: "2px 0", borderBottom: `1px solid ${c.border}20` }}>
                          <div style={{ ...sf, fontSize: 12, color: c.text }}>{r.name}</div>
                          <div style={{ ...sf, fontSize: 12, color: c.text }}>RM{r.val.toLocaleString("en-US",{maximumFractionDigits:0})}</div>
                          <div/>
                        </div>
                      ))}
                      <div style={{ ...sf, fontSize: 9, color: c.muted, fontStyle:"italic", marginTop:2 }}>From transactions — edit via Holdings tab</div>
                    </div>
                  </div>
                </div>

                {/* COL 2: Liabilities — editable */}
                <div style={{ paddingLeft: 16, paddingRight: 8, borderRight: `1px solid ${c.border}`, display: "flex", flexDirection: "column", minHeight: 0, overflow: "hidden" }}>
                  {/* header: same grid as rows so total aligns with last data col */}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 88px 72px 48px 38px", gap: 4, alignItems: "baseline", paddingBottom: 3, borderBottom: `1px solid ${c.border}`, marginBottom: 4 }}>
                    <div style={{ ...hdr, color: c.rust }}>◆ TOTAL LIABILITIES</div>
                    <div style={{ ...sf, fontSize: 13, color: c.rust, fontWeight: 600, gridColumn: "2 / 5", textAlign: "right" }}>RM{totalLiabilities.toLocaleString("en-US",{maximumFractionDigits:0})}</div>
                    <div/>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 88px 72px 48px 38px", gap: 4, ...hdr, color: c.muted, padding: "2px 0", borderBottom: `1px solid ${c.border}30`, marginBottom: 2 }}>
                    <div>NAME</div><div style={{textAlign:"right"}}>OUTSTANDING</div><div style={{textAlign:"right"}}>SAVED UP</div><div style={{textAlign:"right", paddingRight:4}}>PCT</div><div></div>
                  </div>
                  <div className="scroll-y" style={{ flex: 1 }}>
                    {liabilities.map((row) => {
                      const outstanding = parseFloat(row.outstanding)||0;
                      const savedUp = parseFloat(row.saved_up)||0;
                      const pct = parseFloat(row.progress_pct)||(outstanding>0?(savedUp/outstanding)*100:0);
                      const isCovered = row === hirePurchase;
                      const isEd = editing?.table==='liabilities' && editing?.id===row.id;
                      if (isEd) return (
                        <div key={row.id} className="edit-row" style={{ display: "flex", gap: 4, padding: "3px 0", borderBottom: `1px solid ${c.border}20`, flexWrap: "wrap", alignItems: "center" }}>
                          <input className="edit-input" style={{width:80}} value={editForm.name||''} onChange={e=>setEditForm(f=>({...f,name:e.target.value}))} placeholder="Name" />
                          <input className="edit-input" style={{width:76}} type="number" value={editForm.outstanding||''} onChange={e=>setEditForm(f=>({...f,outstanding:e.target.value}))} placeholder="Outstanding" />
                          <input className="edit-input" style={{width:66}} type="number" value={editForm.saved_up||''} onChange={e=>setEditForm(f=>({...f,saved_up:e.target.value}))} placeholder="Saved up" />
                          <input className="edit-input" style={{width:50}} type="number" value={editForm.progress_pct||''} onChange={e=>setEditForm(f=>({...f,progress_pct:e.target.value}))} placeholder="Pct%" />
                          <input className="edit-input" style={{width:90}} value={editForm.notes||''} onChange={e=>setEditForm(f=>({...f,notes:e.target.value}))} placeholder="Notes" />
                          <button className="btn-icon btn-save" style={{opacity:1}} onClick={commitEdit} disabled={saving}>✓</button>
                          <button className="btn-icon btn-cancel" style={{opacity:1}} onClick={cancelEdit}>✕</button>
                        </div>
                      );
                      return (
                        <div key={row.id} className="milestone-row" style={{ display: "grid", gridTemplateColumns: "1fr 88px 72px 48px 38px", gap: 4, padding: "3px 0", borderBottom: `1px solid ${c.border}20`, alignItems: "start" }}>
                          <div>
                            <div style={{ ...sf, fontSize: 12, color: c.text }}>
                              {row.name}{isCovered && <span style={{ ...sf, fontSize: 9, color: c.teal, marginLeft: 6 }}>ASNB</span>}
                            </div>
                            {row.notes && <div style={{ ...sf, fontSize: 9, color: c.muted, fontStyle: "italic" }}>{row.notes}</div>}
                          </div>
                          <div style={{ ...sf, textAlign: "right", fontSize: 12, color: isCovered ? c.muted : c.rust, textDecoration: isCovered ? "line-through" : "none" }}>RM{outstanding.toLocaleString("en-US",{maximumFractionDigits:0})}</div>
                          <div style={{ ...sf, textAlign: "right", fontSize: 12, color: c.green }}>RM{savedUp.toLocaleString("en-US",{maximumFractionDigits:0})}</div>
                          <div style={{ ...sf, textAlign: "right", fontSize: 12, color: pct>=100?c.green:c.gold, paddingRight: 4 }}>{pct.toFixed(1)}%</div>
                          <div style={{ display:"flex", gap:1, justifyContent:"flex-end", paddingLeft: 2 }}>
                            <button className="btn-icon btn-edit" onClick={()=>startEdit('liabilities',row)}>✎</button>
                            <button className="btn-icon btn-delete" onClick={()=>deleteRow('liabilities',row.id)}>✕</button>
                          </div>
                        </div>
                      );
                    })}
                    {editing?.table==='liabilities' && editing?.id==='new' ? (
                      <div className="edit-row" style={{ display: "flex", gap: 4, padding: "3px 0", flexWrap: "wrap", alignItems: "center" }}>
                        <input className="edit-input" style={{width:80}} value={editForm.name||''} onChange={e=>setEditForm(f=>({...f,name:e.target.value}))} placeholder="Name" />
                        <input className="edit-input" style={{width:76}} type="number" value={editForm.outstanding||''} onChange={e=>setEditForm(f=>({...f,outstanding:e.target.value}))} placeholder="Outstanding" />
                        <input className="edit-input" style={{width:66}} type="number" value={editForm.saved_up||''} onChange={e=>setEditForm(f=>({...f,saved_up:e.target.value}))} placeholder="Saved up" />
                        <input className="edit-input" style={{width:50}} type="number" value={editForm.progress_pct||''} onChange={e=>setEditForm(f=>({...f,progress_pct:e.target.value}))} placeholder="Pct%" />
                        <input className="edit-input" style={{width:90}} value={editForm.notes||''} onChange={e=>setEditForm(f=>({...f,notes:e.target.value}))} placeholder="Notes" />
                        <button className="btn-icon btn-save" style={{opacity:1}} onClick={commitEdit} disabled={saving}>✓</button>
                        <button className="btn-icon btn-cancel" style={{opacity:1}} onClick={cancelEdit}>✕</button>
                      </div>
                    ) : (
                      <button className="btn-add" onClick={()=>startAdd('liabilities',{name:'',outstanding:'',saved_up:'',progress_pct:'',notes:''})}>+ Add liability</button>
                    )}
                  </div>
                </div>

                {/* COL 3: Net Worth */}
                <div style={{ paddingLeft: 16, paddingRight: 8, display: "flex", flexDirection: "column", gap: 10, justifyContent: "center", overflow: "hidden" }}>
                  <div style={{ ...hdr, color: c.gold }}>◆ NET WORTH</div>
                  {[
                    { label: "TOTAL ASSETS", val: totalAssets, color: c.teal },
                    { label: "TOTAL LIABILITIES (NET)", val: totalLiabilities, color: c.rust },
                  ].map((item, i) => (
                    <div key={i}>
                      <div style={{ ...sf, fontSize: 9, color: c.muted, letterSpacing: 1, marginBottom: 1 }}>{item.label}</div>
                      <div style={{ ...sf, fontSize: 14, color: item.color, fontWeight: 600 }}>RM{item.val.toLocaleString("en-US",{maximumFractionDigits:0})}</div>
                    </div>
                  ))}
                  <div style={{ borderTop: `1px solid ${c.gold}`, paddingTop: 6 }}>
                    <div style={{ ...sf, fontSize: 9, color: c.muted, letterSpacing: 1, marginBottom: 2 }}>NET WORTH</div>
                    <div className={netWorth < 0 ? "neg-glow" : "gold-shimmer"} style={{ ...sf, fontSize: 22, fontWeight: 700, fontStyle: "italic" }}>
                      {netWorth<0?"-":""}RM<AnimatedNumber value={Math.abs(netWorth)} />
                    </div>
                  </div>
                  <div>
                    <div style={{ height: 6, background: c.panel2, display: "flex", marginBottom: 3 }}>
                      <div style={{ width: `${Math.min((totalAssets/Math.max(totalAssets+totalLiabilities,1))*100,100)}%`, height:"100%", background: c.teal }} />
                      <div style={{ flex:1, height:"100%", background: c.rust }} />
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between" }}>
                      <div style={{ ...sf, fontSize: 9, color: c.teal }}>Assets {((totalAssets/Math.max(totalAssets+totalLiabilities,1))*100).toFixed(1)}%</div>
                      <div style={{ ...sf, fontSize: 9, color: c.rust }}>Liab {((totalLiabilities/Math.max(totalAssets+totalLiabilities,1))*100).toFixed(1)}%</div>
                    </div>
                  </div>
                  <div style={{ ...sf, fontSize: 10, color: c.muted, fontStyle: "italic", lineHeight: 1.5, borderTop: `1px solid ${c.border}`, paddingTop: 6 }}>
                    {netWorth>=0 ? `Assets exceed liabilities by RM${netWorth.toLocaleString("en-US",{maximumFractionDigits:0})}.` : `Liabilities exceed assets by RM${Math.abs(netWorth).toLocaleString("en-US",{maximumFractionDigits:0})}. Keep building.`}
                  </div>
                </div>

              </div>
            );
          })()}
        </div>
      </div>

      <footer style={{ display: "flex", justifyContent: "space-between", padding: "1px 8px", fontSize: 9, fontFamily: "JetBrains Mono, monospace", color: c.muted, borderTop: `1px solid ${c.border}`, fontWeight: 500 }}>
        <div>{transactions.length} TXNS · {dividends.length} DIV PAYMENTS · {active.length} POSITIONS</div>
        <div className="display-serif" style={{ fontStyle: "italic", fontFamily: "Fraunces, serif", fontSize: 12, fontWeight: 400 }}>
          "Compound interest is the eighth wonder of the world."
        </div>
        <div>NOT FINANCIAL ADVICE</div>
      </footer>
    </div>
  );
}

function Stat({ label, value }) {
  return (
    <div>
      <div className="mono muted" style={{ fontSize: 9, letterSpacing: 1.5, marginBottom: 2, fontWeight: 500 }}>{label}</div>
      <div style={{ fontSize: 17, fontWeight: 500, color: c.text }}>{value}</div>
    </div>
  );
}

function HoldingsTable({ title, rows, totalRM, color, fxRate }) {
  const cols = "1fr 1fr 1fr 1fr";
  const rowStyle = { display: "grid", gridTemplateColumns: cols, gap: 8 };
  return (
    <div style={{ display: "flex", flexDirection: "column", minHeight: 0 }}>
      <div style={{ ...rowStyle, alignItems: "baseline", paddingBottom: 5, borderBottom: `1px solid ${c.border}`, marginBottom: 5 }}>
        <div className="mono" style={{ fontSize: 11, letterSpacing: 1.5, color, fontWeight: 600, gridColumn: "1 / 4" }}>{title}</div>
        <div className="mono gold" style={{ fontSize: 13, fontWeight: 600, textAlign: "right" }}>RM{totalRM.toLocaleString("en-US", { maximumFractionDigits: 0 })}</div>
      </div>
      <div style={{ ...rowStyle, fontSize: 10, letterSpacing: 1.2, color: c.muted, fontFamily: "JetBrains Mono, monospace", padding: "3px 0 5px", fontWeight: 500 }}>
        <div>TICKER</div>
        <div style={{ textAlign: "right" }}>SHARES</div>
        <div style={{ textAlign: "right" }}>LIVE</div>
        <div style={{ textAlign: "right" }}>VAL (RM)</div>
      </div>
      <div className="scroll-y" style={{ minHeight: 0 }}>
        {rows.length === 0 && (
          <div className="muted" style={{ fontSize: 13, padding: "12px 0", textAlign: "center", fontStyle: "italic" }}>No positions</div>
        )}
        {rows.map((h, i) => {
          const cur = h.market === 'MY' ? 'RM' : '$';
          return (
            <div key={i} style={{ ...rowStyle, padding: "6px 0", borderBottom: `1px solid ${c.border}40`, alignItems: "center" }}>
              <div style={{ fontSize: 14, fontStyle: "italic", color: c.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{h.ticker}</div>
              <div className="mono muted" style={{ textAlign: "right", fontSize: 12 }}>
                {h.market === 'MY' ? h.units.toLocaleString('en', { maximumFractionDigits: 0 }) : h.units.toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
              </div>
              <div className="mono" style={{ textAlign: "right", fontSize: 12, color: h.livePrice ? c.text : c.muted }}>
                {h.livePrice ? `${cur}${h.livePrice.toFixed(2)}` : '—'}
              </div>
              <div className="mono gold" style={{ textAlign: "right", fontSize: 13, fontWeight: 600 }}>
                RM{h.curValRM.toLocaleString("en-US", { maximumFractionDigits: 0 })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ControlInput({ label, value, onChange, type = "number" }) {
  return (
    <div>
      <div className="mono muted" style={{ fontSize: 9, letterSpacing: 1.5, marginBottom: 4, fontWeight: 500 }}>{label}</div>
      <input type={type} value={value} onChange={(e) => onChange(e.target.value)} style={{
        width: "100%", background: c.panel2, border: `1px solid ${c.border}`,
        color: c.gold, padding: "8px 12px", fontFamily: "JetBrains Mono, monospace", fontSize: 14, fontWeight: 500,
      }} />
    </div>
  );
}

try {
  if (typeof Recharts === 'undefined') {
    document.getElementById('root').innerHTML = '<div style="padding:40px;color:#c97b5e;font-family:Inter,sans-serif;">Recharts library failed to load.</div>';
  } else if (typeof supabase === 'undefined') {
    document.getElementById('root').innerHTML = '<div style="padding:40px;color:#c97b5e;font-family:Inter,sans-serif;">Supabase library failed to load.</div>';
  } else {
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  }
} catch (err) {
  document.getElementById('root').innerHTML = '<div style="padding:40px;color:#c97b5e;font-family:Inter,sans-serif;white-space:pre-wrap;">ERROR: ' + err.message + '\n\n' + err.stack + '</div>';
}
</script>
</body>
</html>
