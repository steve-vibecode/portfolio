function AnimatedNumber({ value, prefix = "", suffix = "", decimals = 0, style = {}, className = "" }) {
  const [display, setDisplay] = useState(value);
  const prev = useRef(value);
  const raf = useRef(null);
  useEffect(() => {
    const start = prev.current;
    const end = value;
    if (start === end) return;
    const duration = 700;
    const startTime = performance.now();
    const tick = (now) => {
      const t = Math.min((now - startTime) / duration, 1);
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      setDisplay(start + (end - start) * ease);
      if (t < 1) raf.current = requestAnimationFrame(tick);
      else { setDisplay(end); prev.current = end; }
    };
    raf.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf.current);
  }, [value]);
  const formatted = decimals > 0
    ? display.toLocaleString("en-US", { minimumFractionDigits: decimals, maximumFractionDigits: decimals })
    : Math.round(display).toLocaleString("en-US");
  return <span className={className} style={style}>{prefix}{formatted}{suffix}</span>;
}

    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// TAB 4 — NET WORTH
// ─────────────────────────────────────────────────────────────────────────────
function TabNetWorth({ fxRate, emergencyFund, investments, dividendTotal, growthTotal, liabilities, editing, setEditing, editForm, setEditForm, commitEdit, deleteRow, saving, startEdit, startAdd, cancelEdit }) {
  const toRM = (amt, cur) => cur === 'USD' ? (parseFloat(amt)||0) * fxRate : (parseFloat(amt)||0);

  // Separate ASNB entries from real liabilities — match by name only
  const asnbLiabilities = liabilities.filter(r => /asnb/i.test(r.name));
  const realLiabilities = liabilities.filter(r => !/asnb/i.test(r.name));

  const asnbTotal = asnbLiabilities.reduce((s, r) => s + (parseFloat(r.saved_up)||0), 0);
  const efTotal = emergencyFund.reduce((s, r) => s + toRM(r.amount, r.currency), 0);
  const efAndAsnbTotal = efTotal + asnbTotal;
  const investTotal = investments.reduce((s, r) => s + toRM(r.amount, r.currency), 0);
  const stocksTotal = dividendTotal + growthTotal;
  const totalAssets = efAndAsnbTotal + investTotal + stocksTotal;

  const totalLiabilities = realLiabilities.reduce((s, r) => s + (parseFloat(r.outstanding)||0), 0);
  const netWorth = totalAssets - totalLiabilities;

  const sf = { fontFamily: "'Fraunces', Georgia, serif" };
  const hdr = { ...sf, fontSize: 9, letterSpacing: 1.5, fontWeight: 600 };

  const efRows = emergencyFund.map(r => ({ ...r, name: r.asset, valRM: toRM(r.amount, r.currency), raw: r }));
  const invRows = investments.map(r => ({ ...r, valRM: toRM(r.amount, r.currency), raw: r }));

  const AssetSection = ({ label, color, tableName, rows, total, fields, extraRows = [] }) => (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4, paddingBottom: 4, borderBottom: `1px solid ${c.border}30` }}>
        <div style={{ ...hdr, color }}>{label}</div>
        <div style={{ ...sf, fontSize: 13, color, fontWeight: 600 }}>RM{total.toLocaleString("en-US",{maximumFractionDigits:0})}</div>
      </div>
      {rows.map((row) => {
        const isEd = editing?.table === tableName && editing?.id === row.id;
        if (isEd) return (

function App() {
  const [isLight, setIsLight] = useState(() => localStorage.getItem('theme') === 'light');
  const toggleTheme = () => {
    setIsLight(prev => {
      const next = !prev;
      localStorage.setItem('theme', next ? 'light' : 'dark');
      document.body.classList.toggle('light', next);
      return next;
    });
  };
  useEffect(() => { document.body.classList.toggle('light', isLight); }, []);
  Object.assign(c, getColors(isLight));

  const [activeTab, setActiveTab] = useState("portfolio");
  const [settings, setSettings] = useState(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? { ...DEFAULT_SETTINGS, ...JSON.parse(saved) } : DEFAULT_SETTINGS;
    } catch (e) { return DEFAULT_SETTINGS; }
  });

  const [transactions, setTransactions] = useState([]);
  const [dividends, setDividends] = useState([]);
  const [prices, setPrices] = useState({});
  const [fxRate, setFxRate] = useState(0);
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [error, setError] = useState(null);
  const [fireTargets, setFireTargets] = useState([]);
  const [savings, setSavings] = useState([]);
  const [emergencyFund, setEmergencyFund] = useState([]);
  const [investments, setInvestments] = useState([]);
  const [liabilities, setLiabilities] = useState([]);
  const [previewPhase, setPreviewPhase] = useState(null);

  const [editing, setEditing] = useState(null);
  const [editForm, setEditForm] = useState({});
  const [saving, setSaving] = useState(false);

  const startEdit = (table, row) => { setEditing({ table, id: row.id }); setEditForm({ ...row }); };
  const startAdd = (table, defaults) => { setEditing({ table, id: 'new' }); setEditForm(defaults); };
  const cancelEdit = () => { setEditing(null); setEditForm({}); };

  const commitEdit = async () => {
    if (!editing) return;
    setSaving(true);
    try {
      const { table, id } = editing;
      if (id === 'new') {
        const { id: _id, ...payload } = editForm;
        const { error } = await sb.from(table).insert([payload]).select();
        if (error) throw error;
      } else {
        const { error } = await sb.from(table).update(editForm).eq('id', id);
        if (error) throw error;
      }
      await fetchData();
      cancelEdit();
    } catch (e) { alert('Save failed: ' + e.message); }
    finally { setSaving(false); }
  };

  const deleteRow = async (table, id) => {
    if (!confirm('Delete this row?')) return;
    setSaving(true);
    try {
      const { error } = await sb.from(table).delete().eq('id', id);
      if (error) throw error;
      await fetchData();
    } catch (e) { alert('Delete failed: ' + e.message); }
    finally { setSaving(false); }
  };

  const saveSettings = (newSettings) => {
    setSettings(newSettings);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(newSettings)); } catch (e) {}
  };

  const fetchData = useCallback(async () => {
    setRefreshing(true);
    setError(null);
    try {
      const [txnRes, divRes, fireRes, savRes, emgRes, invRes, liabRes] = await Promise.all([
        sb.from('transactions').select('*').order('created_at', { ascending: true }),
        sb.from('dividends').select('*').order('created_at', { ascending: true }),
        sb.from('fire_targets').select('*').order('id', { ascending: true }),
        sb.from('savings').select('*'),
        sb.from('emergency_fund').select('*'),
        sb.from('investments').select('*'),
        sb.from('liabilities').select('*'),
      ]);
      if (txnRes.error) throw new Error('Supabase txn: ' + txnRes.error.message);
      setSavings(savRes.data || []);
      setEmergencyFund(emgRes.data || []);
      setInvestments(invRes.data || []);
      setLiabilities(liabRes.data || []);

      const txns = (txnRes.data || []).map(r => ({
        id: r.id, ticker: r.ticker, market: r.market, action: r.action,
        type: r.type, units: parseFloat(r.units), price: parseFloat(r.price),
        date: r.date, divTax: r.div_tax || 0,
      }));
      setTransactions(txns);
      setDividends((divRes.data || []).map(r => ({
        id: r.id, ticker: r.ticker, market: r.market, amount: parseFloat(r.amount), date: r.date,
      })));
      setFireTargets(fireRes.data || []);

      const holdings = {};
      for (const t of txns) {
        if (!holdings[t.ticker]) holdings[t.ticker] = { ticker: t.ticker, market: t.market, units: 0 };
        if (t.action === 'buy') holdings[t.ticker].units += t.units;
        else holdings[t.ticker].units -= t.units;
      }
      const active = Object.values(holdings).filter(h => h.units > 0.00001);
      const symbols = active.map(h => toYahooSymbol(h.ticker, h.market));

      if (symbols.length) {
        const [priceResp, rateResp] = await Promise.all([
          fetch(`${WORKER_URL}/price?symbols=${symbols.join(',')}`),
          fetch(`${WORKER_URL}/rate`),
        ]);
        const priceData = await priceResp.json();
        const rateData = await rateResp.json();
        setPrices(priceData || {});
        const usdMyr = rateData.usdMyr || rateData.rate;
        if (usdMyr && usdMyr > 1) setFxRate(usdMyr);
      }
      setLastUpdated(new Date());
    } catch (err) {
      console.error(err);
      setError(err.message);
    } finally {
      setRefreshing(false);
      setLoading(false);
    }
  }, []);

  useEffect(() => { fetchData(); }, [fetchData]);

  // Compute holdings
  const holdingsMap = {};
  for (const t of transactions) {
    if (!holdingsMap[t.ticker]) holdingsMap[t.ticker] = { ticker: t.ticker, market: t.market, type: t.type, units: 0, costBasis: 0 };
    const h = holdingsMap[t.ticker];
    if (t.action === 'buy') { h.costBasis += t.units * t.price; h.units += t.units; }
    else { const avg = h.units ? h.costBasis / h.units : 0; h.costBasis -= avg * t.units; h.units -= t.units; }
  }
  const active = Object.values(holdingsMap).filter(h => h.units > 0.00001);
  const toMYR = (val, market) => market === 'US' ? (val || 0) * fxRate : (val || 0);
  const calcStock = (h) => {
    const sym = toYahooSymbol(h.ticker, h.market);
    const livePrice = prices[sym]?.price ?? null;
    const curVal = livePrice ? livePrice * h.units : null;
    const curValRM = curVal !== null ? toMYR(curVal, h.market) : toMYR(h.costBasis, h.market);
    return { livePrice, curValRM };
  };

  const dividendStocks = active.filter(h => h.type === 'dividend');
  const growthStocks = active.filter(h => h.type === 'growth');
  const dividendRows = dividendStocks.map(h => ({ ...h, ...calcStock(h) }));
  const growthRows = growthStocks.map(h => ({ ...h, ...calcStock(h) }));
  const dividendTotal = dividendRows.reduce((s, h) => s + h.curValRM, 0);
  const growthTotal = growthRows.reduce((s, h) => s + h.curValRM, 0);
  const totalValue = dividendTotal + growthTotal;
  const growthPct = totalValue > 0 ? (growthTotal / totalValue) * 100 : 0;
  const dividendPct = 100 - growthPct;

  const yearsRemaining = RETIREMENT_AGE - settings.age;
  const progressPct = (totalValue / TARGET) * 100;
  let autoPhase = 1;
  if (settings.age > 40) autoPhase = 3;
  else if (settings.age > 35) autoPhase = 2;
  const phaseLabels = { 1: "Aggressive Accumulation", 2: "Transition", 3: "Income Rotation" };
  const phaseColors = { 1: c.gold, 2: c.goldDim, 3: c.rust };
  const phaseAdvice = {
    1: "RM6K/month. 100% Growth allocation. Focus on capital accumulation. Dividends from Dividend stocks reinvested.",
    2: "RM4K/month. Still 50/50 split. Maintain discipline — no chasing growth. Build dividend base while continuing selective growth exposure until age 40.",
    3: "Gradually rotate Growth → Dividend from age 40 to 45. Reduce growth exposure yearly until 100% dividend at 45. No abrupt selling — smooth transition.",
  };
  const monthlyPlans = {
    1: [
      { ticker: "VWRA", name: "VWRA", amount: 3000 },
      { ticker: "GROWTH", name: "MSFT / NVDA / META / AAPL rotation", amount: 3000 },
    ],
    2: [
      { ticker: "VWRA", name: "VWRA", amount: 1000 },
      { ticker: "GROWTH", name: "MSFT / NVDA / META / AAPL rotation", amount: 1000 },
      { ticker: "JEPQ", name: "JEPQ", amount: 1000 },
      { ticker: "DIV", name: "MAYBANK / SUNREIT rotation", amount: 1000 },
    ],
    3: [{ ticker: "ROTATE", name: "Growth → Dividend Rotation", amount: 0 }],
  };
  const yearlyPlan = [
    { age: 31, phase: 1, dividendValue: 140000, growthValue: 128000, total: 268000, growthPct: 48, dividendPct: 52 },
    { age: 32, phase: 1, dividendValue: 148400, growthValue: 210240, total: 358640, growthPct: 59, dividendPct: 41 },

    { age: 34, phase: 1, dividendValue: 166742, growthValue: 394984, total: 561726, growthPct: 70, dividendPct: 30 },

    { age: 40, phase: 2, dividendValue: 371817, growthValue: 873379, total: 1245197, growthPct: 70, dividendPct: 30 },

    { age: 45, phase: 3, dividendValue: 1639897, growthValue: 0, total: 1639897, growthPct: 0, dividendPct: 100 },
  ];
  const projectionData = yearlyPlan.map(r => ({ age: r.age, value: r.total }));
  const finalProjection = yearlyPlan[yearlyPlan.length - 1].total;
  const allocationData = [
    { name: "Growth", value: growthPct, fill: c.gold },
    { name: "Dividend", value: dividendPct, fill: c.teal },
  ];
  const targetAllocation = [
    { phase: "Now", growth: Math.round(growthPct), dividend: Math.round(dividendPct) },
    { phase: "35", growth: 100, dividend: 0 },
    { phase: "40", growth: 50, dividend: 50 },
    { phase: "45", growth: 0, dividend: 100 },
  ];

  const lastUpdatedStr = lastUpdated
    ? lastUpdated.toLocaleString('en-MY', { dateStyle: 'medium', timeStyle: 'short' })
    : '—';

  const tabs = [
    { id: "portfolio", label: "Current Portfolio", dot: c.gold },
    { id: "holdings", label: "Holdings / Milestones", dot: c.teal },
    { id: "plan", label: "Yearly Plan / FIRE Progress", dot: c.goldDim },
    { id: "networth", label: "Net Worth", dot: c.rust },
  ];

  const sharedEditProps = { editing, setEditing, editForm, setEditForm, commitEdit, deleteRow, saving, startEdit, startAdd, cancelEdit };

  return (
    <div style={{
      height: "100vh", width: "100vw",
      background: c.bg,
      display: "flex", flexDirection: "column",
    }}>
      {/* ── HEADER ── */}
      <header style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "5px 16px", borderBottom: `1px solid ${c.border}`,
        flexShrink: 0, background: c.bg,
      }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 16 }}>
          <div className="mono" style={{ fontSize: 9, letterSpacing: 2.5, color: c.gold, fontWeight: 500 }}>◆ PORTFOLIO LEDGER</div>
          <h1 className="display-serif" style={{ fontSize: 22, fontWeight: 500, margin: 0, letterSpacing: -0.5 }}>
            The Road to <span className="gold" style={{ fontStyle: "italic" }}>Forty-Five</span>
          </h1>
          <div className="mono" style={{ fontSize: 9, letterSpacing: 2.5, fontWeight: 500, color: c.muted }}>14yr · RM1.6M @ 6%</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          {error && <span style={{ color: c.rust, fontSize: 10 }}>⚠ {error}</span>}
          <span className="mono muted" style={{ fontSize: 9, letterSpacing: 1 }}><span className="pulse" style={{ color: c.green }}>●</span> LIVE</span>
          <span className="gold mono" style={{ fontSize: 10 }}>{lastUpdatedStr}</span>
          <button className="theme-btn" onClick={toggleTheme}>{isLight ? '🌙' : '☀️'}</button>
          <button onClick={fetchData} disabled={refreshing} style={{
            background: refreshing ? c.panel2 : "transparent",
            color: c.gold, border: `1px solid ${c.gold}`,
            padding: "3px 12px", fontSize: 9, letterSpacing: 1.5,
            cursor: refreshing ? "wait" : "pointer",
            fontFamily: "JetBrains Mono, monospace", fontWeight: 500,
          }}>
            {refreshing ? <span className="spinner">⟳</span> : "↻"} {refreshing ? "SYNCING..." : "REFRESH"}
          </button>
        </div>
      </header>

      {/* ── TAB CONTENT (fills remaining space) ── */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minHeight: 0, overflow: "hidden" }}>
        {loading ? (
          <div className="display-serif" style={{ display: "flex", alignItems: "center", justifyContent: "center", flex: 1, color: c.gold, fontSize: 16 }}>
            <span className="spinner" style={{ marginRight: 12 }}>⟳</span>
            Connecting to Supabase + fetching live prices...
          </div>
        ) : (
          <>
            {activeTab === "portfolio" && (
              <TabPortfolio
                settings={settings} saveSettings={saveSettings}
                totalValue={totalValue} dividendTotal={dividendTotal} growthTotal={growthTotal}
                fxRate={fxRate} progressPct={progressPct} yearsRemaining={yearsRemaining}
                finalProjection={finalProjection} projectionData={projectionData}
                allocationData={allocationData} targetAllocation={targetAllocation}
                yearlyPlan={yearlyPlan} phaseColors={phaseColors} phaseLabels={phaseLabels}
                phaseAdvice={phaseAdvice} monthlyPlans={monthlyPlans}
                previewPhase={previewPhase} setPreviewPhase={setPreviewPhase} autoPhase={autoPhase}
              />
            )}
            {activeTab === "holdings" && (
              <TabHoldings
                dividendRows={dividendRows} growthRows={growthRows}
                dividendTotal={dividendTotal} growthTotal={growthTotal}
                fxRate={fxRate} settings={settings} saveSettings={saveSettings}
              />
            )}
            {activeTab === "plan" && (
              <TabPlan
                settings={settings} saveSettings={saveSettings}
                yearlyPlan={yearlyPlan} phaseColors={phaseColors}
                fireTargets={fireTargets} totalValue={totalValue} dividendTotal={dividendTotal}
                {...sharedEditProps}
              />
            )}
            {activeTab === "networth" && (
              <TabNetWorth
                fxRate={fxRate} emergencyFund={emergencyFund} investments={investments}
                dividendTotal={dividendTotal} growthTotal={growthTotal} liabilities={liabilities}
                {...sharedEditProps}
              />
            )}
          </>
        )}
      </div>

      {/* ── GOOGLE SHEETS–STYLE TAB BAR ── */}
      <div style={{
        display: "flex", alignItems: "flex-end", gap: 2,
        padding: "0 12px", borderTop: `1px solid ${c.border}`,
        background: c.bg, flexShrink: 0, height: 34,
      }}>
        {tabs.map((tab, i) => {
          const isActive = activeTab === tab.id;
          return (
            <div
              key={tab.id}
              onClick={() => setActiveTab(tab.id)}
              style={{
                display: "flex", alignItems: "center", gap: 7,
                padding: "0 16px", height: 30,
                fontFamily: "JetBrains Mono, monospace",
                fontSize: 10, letterSpacing: 0.8, fontWeight: 500,
                cursor: "pointer",
                border: `1px solid ${isActive ? c.border : "transparent"}`,
                borderBottom: "none",
                borderRadius: "3px 3px 0 0",
                background: isActive ? (isLight ? "#fffdf7" : "#0f1d2c") : "transparent",
                color: isActive ? c.gold : c.muted,
                position: "relative", bottom: -1,
                transition: "all 0.15s", userSelect: "none",
              }}
              onMouseEnter={e => { if (!isActive) { e.currentTarget.style.background = c.panel2; e.currentTarget.style.color = c.text; } }}
              onMouseLeave={e => { if (!isActive) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = c.muted; } }}
            >
              <div style={{ width: 7, height: 7, borderRadius: "50%", background: tab.dot, flexShrink: 0, opacity: isActive ? 1 : 0.4 }} />
              {tab.label}
            </div>
          );
        })}
        {/* footer info on the right */}
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 16, fontSize: 9, fontFamily: "JetBrains Mono, monospace", color: c.muted, paddingBottom: 2 }}>
          <span>{transactions.length} TXNS · {dividends.length} DIV · {active.length} POSITIONS</span>
          <span className="display-serif" style={{ fontStyle: "italic", fontSize: 11, fontFamily: "Fraunces, serif", fontWeight: 400 }}>
            "Compound interest is the eighth wonder of the world."
          </span>
          <span>NOT FINANCIAL ADVICE</span>
        </div>
      </div>
    </div>
  );
}

function Stat({ label, value }) {
  return (
    <div>
      <div className="mono muted" style={{ fontSize: 9, letterSpacing: 1.5, marginBottom: 2, fontWeight: 500 }}>{label}</div>
      <div style={{ fontSize: 17, fontWeight: 500, color: c.text }}>{value}</div>
    </div>
  );
}

function ControlInput({ label, value, onChange, type = "number" }) {
  return (
    <div>
      <div className="mono muted" style={{ fontSize: 9, letterSpacing: 1.5, marginBottom: 4, fontWeight: 500 }}>{label}</div>
      <input type={type} value={value} onChange={(e) => onChange(e.target.value)} style={{
        width: "100%", background: c.panel2, border: `1px solid ${c.border}`,
        color: c.gold, padding: "6px 10px", fontFamily: "JetBrains Mono, monospace", fontSize: 13, fontWeight: 500,
      }} />
    </div>
  );
}

try {
  if (typeof Recharts === 'undefined') {
    document.getElementById('root').innerHTML = '<div style="padding:40px;color:#c97b5e;font-family:Inter,sans-serif;">Recharts library failed to load.</div>';
  } else if (typeof supabase === 'undefined') {
    document.getElementById('root').innerHTML = '<div style="padding:40px;color:#c97b5e;font-family:Inter,sans-serif;">Supabase library failed to load.</div>';
  } else {
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  }
} catch (err) {
  document.getElementById('root').innerHTML = '<div style="padding:40px;color:#c97b5e;font-family:Inter,sans-serif;white-space:pre-wrap;">ERROR: ' + err.message + '\n\n' + err.stack + '</div>';
}
</script>
</body>
</html>
